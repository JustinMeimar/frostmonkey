name = "pageload"
description = "Real-site pageload timing: default JIT vs FrostMonkey AOT (replay proxy)"
default_iterations = 15
allow_failure = false

[analyze]
timing = "analyses/parse_timing.py"

[figures.startup-bar]
analysis = "timing"
script = "figures/startup_bar.py"

[variables]
TAIL = "2>&1"

[variants]
reddit-default = "mitmdump --server-replay /home/justin/.fossil/projects/spidermonkey/pageload/recordings/reddit.flow --set server_replay_extra=kill --set server_replay_reuse=true -p 8081 -q & MPID=$!; sleep 1 && cd @FIREFOX && @SANDBOX @MC_AOT ./mach browsertime --headless -n 1 -b firefox --firefox.binaryPath @BIN_RELEASE --proxy.http localhost:8081 --proxy.https localhost:8081 --firefox.acceptInsecureCerts --pageCompleteCheckNetworkIdle --timeouts.networkIdle 3000 --timeouts.pageCompleteCheck 30000 https://www.reddit.com $TAIL; kill $MPID 2>/dev/null || true"
reddit-fm = "mitmdump --server-replay /home/justin/.fossil/projects/spidermonkey/pageload/recordings/reddit.flow --set server_replay_extra=kill --set server_replay_reuse=true -p 8081 -q & MPID=$!; sleep 1 && cd @FIREFOX && @SANDBOX JIT_OPTION_useAOTBaseline=true JIT_OPTION_useAOTInterp=true JIT_OPTION_enableAOTICs=true JIT_OPTION_enableAOTICEnforce=true JIT_OPTION_baselineInterpreterWarmUpThreshold=0 @MC_AOT ./mach browsertime --headless -n 1 -b firefox --proxy.http localhost:8081 --proxy.https localhost:8081 --firefox.acceptInsecureCerts --pageCompleteCheckNetworkIdle --timeouts.networkIdle 3000 --timeouts.pageCompleteCheck 30000 https://www.reddit.com $TAIL; kill $MPID 2>/dev/null || true"
